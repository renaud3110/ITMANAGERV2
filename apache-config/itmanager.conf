<VirtualHost *:80>
    # Configuration de base
    ServerName itmanager.local
    ServerAlias www.itmanager.local
    DocumentRoot /var/www/cmdb
    DirectoryIndex index.php
    
    # Logs
    ErrorLog ${APACHE_LOG_DIR}/itmanager_error.log
    CustomLog ${APACHE_LOG_DIR}/itmanager_access.log combined
    LogLevel warn
    
    # Configuration du répertoire principal
    <Directory /var/www/cmdb>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Support PHP
        <IfModule mod_php.c>
            php_admin_value upload_max_filesize 10M
            php_admin_value post_max_size 10M
            php_admin_value memory_limit 256M
            php_admin_value max_execution_time 300
        </IfModule>
    </Directory>
    
    # Sécurité : Empêcher l'accès aux fichiers sensibles
    <Directory /var/www/cmdb/config>
        Require all denied
    </Directory>
    
    <Files ".htaccess">
        Require all denied
    </Files>
    
    <Files "*.sql">
        Require all denied
    </Files>
    
    <Files "README.md">
        Require all denied
    </Files>
    
    # Configuration des assets statiques
    <Directory /var/www/cmdb/assets>
        Options -Indexes
        AllowOverride None
        Require all granted
        
        # Cache pour ressources statiques
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType text/css "access plus 1 month"
            ExpiresByType application/javascript "access plus 1 month"
            ExpiresByType image/png "access plus 1 year"
            ExpiresByType image/jpg "access plus 1 year"
            ExpiresByType image/jpeg "access plus 1 year"
            ExpiresByType image/gif "access plus 1 year"
            ExpiresByType image/svg+xml "access plus 1 year"
        </IfModule>
    </Directory>
    
    # Modules requis activés
    <IfModule mod_rewrite.c>
        RewriteEngine On
    </IfModule>
    
    <IfModule mod_headers.c>
        # Headers de sécurité
        Header always set X-Content-Type-Options nosniff
        Header always set X-Frame-Options DENY
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        
        # Headers pour les API JSON
        <LocationMatch "\.php$">
            Header set Content-Type "text/html; charset=UTF-8"
        </LocationMatch>
    </IfModule>
    
</VirtualHost>

